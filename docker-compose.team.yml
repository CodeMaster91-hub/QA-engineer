version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.team
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src

volumes:
  redis-data:
