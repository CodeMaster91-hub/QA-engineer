version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres-shared
      - DB_PORT=5432
      - DB_DATABASE=qa_platform
      - DB_USERNAME=qa_user
      - DB_PASSWORD=${DB_PASSWORD:-strong_password}
      - DB_SCHEMA=${TEAM_NAME:-team1}
      - REDIS_ENABLED=false
      - LLM_BASE_URL=http://corporate-llm:8080/v1
      - LLM_MOCK=true
      - NODE_ENV=development
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src

volumes:
  redis-data:
